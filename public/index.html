<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Is It Whiskey DST Live</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">DST</div>
          <div>
            <p class="eyebrow">Drive scoring liveboard</p>
            <h1 id="leagueName">Is It Whiskey</h1>
          </div>
        </div>
        <div class="controls">
          <label>
            Season
            <select id="seasonSelect"></select>
          </label>
          <label>
            Week
            <select id="weekSelect"></select>
          </label>
          <button id="refreshButton" type="button" title="Refresh now">Refresh</button>
        </div>
      </header>

      <main>
        <section class="status-strip" aria-live="polite">
          <div>
            <span class="label">Updated</span>
            <strong id="updatedAt">Waiting</strong>
            <span id="statusDetail" class="status-detail">Loading</span>
          </div>
        </section>

        <section>
          <div class="section-title">
            <h2>Matchups</h2>
            <p>Custom total with Sleeper total tucked underneath</p>
          </div>
          <div id="matchups" class="matchup-grid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <a href="https://github.com/reidmojo/dst-live-scoreboard" target="_blank" rel="noreferrer">Source</a>
      </footer>
    </div>

    <dialog id="auditDialog">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">DST audit</p>
          <h2 id="auditTitle">Drive events</h2>
        </div>
        <button id="closeDialog" type="button" title="Close">Close</button>
      </div>
      <div id="auditBody" class="audit-list"></div>
    </dialog>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
