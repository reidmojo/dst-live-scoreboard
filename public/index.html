<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Is It Whiskey DST Live</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">DST</div>
          <div>
            <p class="eyebrow">Drive scoring liveboard</p>
            <h1 id="leagueName">Is It Whiskey</h1>
          </div>
        </div>
        <div class="controls">
          <label>
            Season
            <select id="seasonSelect">
              <option value="2025">2025</option>
            </select>
          </label>
          <label>
            Week
            <select id="weekSelect"></select>
          </label>
          <button id="refreshButton" type="button" title="Refresh now">Refresh</button>
        </div>
      </header>

      <main>
        <section class="status-strip" aria-live="polite">
          <div>
            <span class="label">Source</span>
            <strong>ESPN live drives</strong>
            <span>Sleeper league totals</span>
          </div>
          <div>
            <span class="label">Updated</span>
            <strong id="updatedAt">Waiting</strong>
            <span id="weekLabel">Week</span>
          </div>
        </section>

        <section class="scoreboard-grid">
          <div>
            <div class="section-title">
              <h2>Matchups</h2>
              <p>Custom total with Sleeper total tucked underneath</p>
            </div>
            <div id="matchups" class="matchup-grid"></div>
          </div>

          <aside>
            <div class="section-title">
              <h2>NFL Games</h2>
              <p>ESPN game state and custom DST totals</p>
            </div>
            <div id="gameList" class="game-list"></div>
          </aside>
        </section>

        <section>
          <div class="section-title">
            <h2>League Stack</h2>
            <p>Sorted by custom total</p>
          </div>
          <div id="leagueBoard" class="team-list"></div>
        </section>
      </main>
    </div>

    <dialog id="auditDialog">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">DST audit</p>
          <h2 id="auditTitle">Drive events</h2>
        </div>
        <button id="closeDialog" type="button" title="Close">Close</button>
      </div>
      <div id="auditBody" class="audit-list"></div>
    </dialog>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
